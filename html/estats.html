<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas de Actividades</title>
    <!-- Importar chart.js para graficos más bonitos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            text-align: center;
            padding: 20px;
        }
        h1 {
            color: #03e9f4;
        }
        .grafico-container {
            margin: 20px auto;
            max-width: 800px;
        }
        canvas {
            background-color: #ffffff;
            border-radius: 8px;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #03e9f4;
            color: #0d1117;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        a:hover {
            background-color: #029dbb;
        }
    </style>
</head>
<body>
    <h1>Estadísticas de Actividades</h1>
    <div class="grafico-container">
        <h2>Cantidad de Actividades por Día</h2>
        <canvas id="lineChart"></canvas>
    </div>
    <div class="grafico-container">
        <h2>Total de Actividades por Tipo</h2>
        <canvas id="pieChart"></canvas>
    </div>
    <div class="grafico-container">
        <h2>Cantidad de Actividades por Mes y Horario</h2>
        <canvas id="barChart"></canvas>
    </div>

    <a href="index.html">Volver al menú</a>
    <script src="../jscript/estats.js"></script>
</body>
</html>
