<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listado de Actividades - T4 Java</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/java/">
                <i class="fas fa-list"></i> Listado de Actividades
            </a>
            <div class="navbar-nav">
                <a class="nav-link" href="/java/">Home</a>
                <a class="nav-link active" href="/java/actividades">Todas las Actividades</a>
                <a class="nav-link" href="http://localhost:5000" target="_blank">Flask App</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-12">
                <h1><i class="fas fa-list"></i> Todas las Actividades</h1>
                <p class="lead">Listado completo de actividades con paginación y carga asíncrona.</p>
            </div>
        </div>

        <!-- Controles de paginación y filtros -->
        <div class="row mb-4">
            <div class="col-md-6">
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-search"></i></span>
                    <input type="text" id="buscarInput" class="form-control" placeholder="Buscar actividades...">
                    <button class="btn btn-outline-secondary" onclick="buscarActividades()">Buscar</button>
                </div>
            </div>
            <div class="col-md-6">
                <div class="d-flex justify-content-end align-items-center">
                    <label for="tamanioPagina" class="form-label me-2">Mostrar:</label>
                    <select id="tamanioPagina" class="form-select" style="width: auto;" onchange="cambiarTamanioPagina()">
                        <option value="5">5</option>
                        <option value="10" selected>10</option>
                        <option value="20">20</option>
                        <option value="50">50</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Loading indicator -->
        <div id="loading" class="text-center" style="display: none;">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Cargando...</span>
            </div>
            <p class="mt-2">Cargando actividades...</p>
        </div>

        <!-- Contenedor de actividades -->
        <div id="actividadesContainer" class="row">
            <!-- Las actividades se cargarán aquí vía JavaScript -->
        </div>

        <!-- Controles de paginación -->
        <div id="paginacionContainer" class="row mt-4">
            <div class="col-md-12">
                <nav aria-label="Paginación de actividades">
                    <ul id="paginacion" class="pagination justify-content-center">
                        <!-- Los controles de paginación se generarán aquí -->
                    </ul>
                </nav>
            </div>
        </div>

        <!-- Información de paginación -->
        <div id="infoPaginacion" class="row mt-2">
            <div class="col-md-12 text-center">
                <small class="text-muted" id="infoTexto">
                    <!-- Información sobre la paginación actual -->
                </small>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Variables globales
        let paginaActual = 0;
        let tamanioPagina = 10;
        let terminoBusqueda = '';
        const API_BASE_URL = 'http://localhost:8080/api';

        // Cargar actividades al iniciar la página
        document.addEventListener('DOMContentLoaded', function() {
            cargarActividades();
        });

        // Función principal para cargar actividades
        async function cargarActividades() {
            mostrarLoading(true);
            
            try {
                const params = new URLSearchParams({
                    page: paginaActual,
                    size: tamanioPagina
                });

                const response = await fetch(`${API_BASE_URL}/actividades?${params}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                mostrarActividades(data.actividades);
                actualizarPaginacion(data);
                actualizarInfoPaginacion(data);
                
            } catch (error) {
                console.error('Error al cargar actividades:', error);
                mostrarError('Error al cargar las actividades. Verifica que el servidor Java esté ejecutándose.');
            } finally {
                mostrarLoading(false);
            }
        }

        // Mostrar/ocultar indicador de carga
        function mostrarLoading(mostrar) {
            document.getElementById('loading').style.display = mostrar ? 'block' : 'none';
        }

        // Mostrar actividades en el DOM
        function mostrarActividades(actividades) {
            const container = document.getElementById('actividadesContainer');
            
            if (actividades.length === 0) {
                container.innerHTML = `
                    <div class="col-md-12">
                        <div class="alert alert-info text-center">
                            <i class="fas fa-info-circle fa-2x mb-3"></i>
                            <h4>No se encontraron actividades</h4>
                            <p>No hay actividades que coincidan con los criterios de búsqueda.</p>
                        </div>
                    </div>
                `;
                return;
            }

            let html = '';
            actividades.forEach(actividad => {
                const fechaInicio = new Date(actividad.diaHoraInicio).toLocaleDateString('es-ES');
                const fechaTermino = actividad.diaHoraTermino ? 
                    new Date(actividad.diaHoraTermino).toLocaleDateString('es-ES') : 'Sin fecha';
                
                const esFinalizada = actividad.diaHoraTermino ? 
                    new Date(actividad.diaHoraTermino) < new Date() : 
                    new Date(actividad.diaHoraInicio) < new Date();

                html += `
                    <div class="col-md-6 col-lg-4 mb-4">
                        <div class="card h-100 shadow-sm actividad-card" 
                             style="cursor: pointer;" 
                             onclick="verDetalleActividad(${actividad.id})">
                            <div class="card-header ${esFinalizada ? 'bg-success' : 'bg-primary'} text-white">
                                <h6 class="card-title mb-0">
                                    <i class="fas fa-map-marker-alt"></i>
                                    ${actividad.comuna ? actividad.comuna.nombre : 'Sin comuna'}
                                    ${esFinalizada ? '<span class="badge bg-light text-dark ms-2">Finalizada</span>' : ''}
                                </h6>
                            </div>
                            <div class="card-body">
                                <h5 class="card-title">${actividad.nombre}</h5>
                                <p class="card-text">
                                    <small class="text-muted">
                                        <i class="fas fa-envelope"></i> ${actividad.email}
                                    </small>
                                </p>
                                ${actividad.descripcion ? 
                                    `<p class="card-text">${actividad.descripcion.substring(0, 100)}${actividad.descripcion.length > 100 ? '...' : ''}</p>` 
                                    : ''}
                                <div class="d-flex justify-content-between align-items-center">
                                    <small class="text-muted">
                                        <i class="fas fa-calendar"></i> ${fechaInicio}
                                    </small>
                                    <span class="badge ${esFinalizada ? 'bg-warning' : 'bg-info'}">
                                        <i class="fas ${esFinalizada ? 'fa-star' : 'fa-eye'}"></i> 
                                        ${esFinalizada ? 'Puntuar' : 'Ver'}
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // Actualizar controles de paginación
        function actualizarPaginacion(data) {
            const paginacion = document.getElementById('paginacion');
            let html = '';

            // Botón Anterior
            if (data.hasPrevious) {
                html += `<li class="page-item">
                    <a class="page-link" href="#" onclick="cambiarPagina(${data.currentPage - 1})">
                        <i class="fas fa-chevron-left"></i> Anterior
                    </a>
                </li>`;
            }

            // Números de página
            const inicio = Math.max(0, data.currentPage - 2);
            const fin = Math.min(data.totalPages - 1, data.currentPage + 2);

            for (let i = inicio; i <= fin; i++) {
                html += `<li class="page-item ${i === data.currentPage ? 'active' : ''}">
                    <a class="page-link" href="#" onclick="cambiarPagina(${i})">${i + 1}</a>
                </li>`;
            }

            // Botón Siguiente
            if (data.hasNext) {
                html += `<li class="page-item">
                    <a class="page-link" href="#" onclick="cambiarPagina(${data.currentPage + 1})">
                        Siguiente <i class="fas fa-chevron-right"></i>
                    </a>
                </li>`;
            }

            paginacion.innerHTML = html;
        }

        // Actualizar información de paginación
        function actualizarInfoPaginacion(data) {
            const infoTexto = document.getElementById('infoTexto');
            const inicio = (data.currentPage * data.size) + 1;
            const fin = Math.min((data.currentPage + 1) * data.size, data.totalElements);
            
            infoTexto.innerHTML = `Mostrando ${inicio} - ${fin} de ${data.totalElements} actividades`;
        }

        // Mostrar error
        function mostrarError(mensaje) {
            const container = document.getElementById('actividadesContainer');
            container.innerHTML = `
                <div class="col-md-12">
                    <div class="alert alert-danger text-center">
                        <i class="fas fa-exclamation-triangle fa-2x mb-3"></i>
                        <h4>Error</h4>
                        <p>${mensaje}</p>
                        <button class="btn btn-outline-danger" onclick="cargarActividades()">
                            <i class="fas fa-redo"></i> Reintentar
                        </button>
                    </div>
                </div>
            `;
        }

        // Funciones de navegación
        function cambiarPagina(nuevaPagina) {
            paginaActual = nuevaPagina;
            cargarActividades();
        }

        function cambiarTamanioPagina() {
            tamanioPagina = parseInt(document.getElementById('tamanioPagina').value);
            paginaActual = 0; // Resetear a la primera página
            cargarActividades();
        }

        function buscarActividades() {
            terminoBusqueda = document.getElementById('buscarInput').value;
            paginaActual = 0; // Resetear a la primera página
            cargarActividades();
        }

        function verDetalleActividad(id) {
            window.location.href = `/java/actividad/${id}`;
        }

        // Buscar al presionar Enter
        document.getElementById('buscarInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                buscarActividades();
            }
        });
    </script>

    <style>
        .actividad-card {
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }
        .actividad-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15) !important;
        }
        .card-title {
            color: #2c3e50;
        }
        .pagination .page-link {
            color: #0d6efd;
        }
        .pagination .page-item.active .page-link {
            background-color: #0d6efd;
            border-color: #0d6efd;
        }
    </style>
</body>
</html>
