<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Búsqueda Avanzada - T4 Java App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/java/">T4 Java App</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/java/">Inicio</a>
                <a class="nav-link active" href="/java/buscar">Buscar</a>
                <a class="nav-link" href="/java/stats">Estadísticas</a>
                <a class="nav-link" href="/java/mapa">Mapa</a>
                <a class="nav-link" href="/java/admin">Admin</a>
                <a class="nav-link" href="http://localhost:5000" target="_blank">Flask App</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-12">
                <h1>Búsqueda Avanzada de Actividades</h1>
                <p class="lead">Utiliza la API de Java para buscar actividades con filtros avanzados</p>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h5>Filtros de Búsqueda</h5>
                    </div>
                    <div class="card-body">
                        <form id="searchForm">
                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre</label>
                                <input type="text" class="form-control" id="nombre" placeholder="Buscar por nombre...">
                            </div>
                            <div class="mb-3">
                                <label for="comunaId" class="form-label">Comuna ID</label>
                                <input type="number" class="form-control" id="comunaId" placeholder="ID de comuna">
                            </div>
                            <div class="mb-3">
                                <label for="regionId" class="form-label">Región ID</label>
                                <input type="number" class="form-control" id="regionId" placeholder="ID de región">
                            </div>
                            <div class="mb-3">
                                <label for="fechaInicio" class="form-label">Fecha Inicio</label>
                                <input type="datetime-local" class="form-control" id="fechaInicio">
                            </div>
                            <div class="mb-3">
                                <label for="fechaFin" class="form-label">Fecha Fin</label>
                                <input type="datetime-local" class="form-control" id="fechaFin">
                            </div>
                            <button type="submit" class="btn btn-primary">Buscar</button>
                            <button type="button" class="btn btn-secondary" onclick="clearForm()">Limpiar</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h5>Resultados de la Búsqueda</h5>
                    </div>
                    <div class="card-body">
                        <div id="loading" class="text-center" style="display: none;">
                            <div class="spinner-border" role="status">
                                <span class="visually-hidden">Cargando...</span>
                            </div>
                        </div>
                        <div id="results"></div>
                        <div id="pagination" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE_URL = 'http://localhost:8080/api';
        let currentPage = 0;
        const pageSize = 10;

        document.getElementById('searchForm').addEventListener('submit', function(e) {
            e.preventDefault();
            currentPage = 0;
            buscarActividades();
        });

        function buscarActividades() {
            const nombre = document.getElementById('nombre').value;
            const comunaId = document.getElementById('comunaId').value;
            const regionId = document.getElementById('regionId').value;
            const fechaInicio = document.getElementById('fechaInicio').value;
            const fechaFin = document.getElementById('fechaFin').value;

            const params = new URLSearchParams();
            if (nombre) params.append('nombre', nombre);
            if (comunaId) params.append('comunaId', comunaId);
            if (regionId) params.append('regionId', regionId);
            if (fechaInicio) params.append('fechaInicio', fechaInicio);
            if (fechaFin) params.append('fechaFin', fechaFin);
            params.append('page', currentPage);
            params.append('size', pageSize);

            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').innerHTML = '';

            fetch(`${API_BASE_URL}/actividades/buscar-avanzado?${params}`)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('loading').style.display = 'none';
                    mostrarResultados(data);
                    mostrarPaginacion(data);
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('results').innerHTML = '<div class="alert alert-danger">Error al cargar los datos</div>';
                });
        }

        function mostrarResultados(data) {
            const resultsDiv = document.getElementById('results');
            
            if (data.content.length === 0) {
                resultsDiv.innerHTML = '<div class="alert alert-info">No se encontraron actividades</div>';
                return;
            }

            let html = '<div class="table-responsive"><table class="table table-striped"><thead><tr>';
            html += '<th>ID</th><th>Nombre</th><th>Email</th><th>Comuna</th><th>Fecha Inicio</th><th>Acciones</th>';
            html += '</tr></thead><tbody>';

            data.content.forEach(actividad => {
                html += `<tr>
                    <td>${actividad.id}</td>
                    <td>${actividad.nombre}</td>
                    <td>${actividad.email}</td>
                    <td>${actividad.comuna ? actividad.comuna.nombre : 'N/A'}</td>
                    <td>${new Date(actividad.diaHoraInicio).toLocaleDateString()}</td>
                    <td><a href="/java/actividad/${actividad.id}" class="btn btn-sm btn-outline-primary">Ver</a></td>
                </tr>`;
            });

            html += '</tbody></table></div>';
            resultsDiv.innerHTML = html;
        }

        function mostrarPaginacion(data) {
            const paginationDiv = document.getElementById('pagination');
            
            if (data.totalPages <= 1) {
                paginationDiv.innerHTML = '';
                return;
            }

            let html = '<nav><ul class="pagination">';
            
            // Previous button
            if (data.number > 0) {
                html += `<li class="page-item"><a class="page-link" href="#" onclick="cambiarPagina(${data.number - 1})">Anterior</a></li>`;
            }

            // Page numbers
            for (let i = 0; i < data.totalPages; i++) {
                if (i === data.number) {
                    html += `<li class="page-item active"><a class="page-link" href="#">${i + 1}</a></li>`;
                } else {
                    html += `<li class="page-item"><a class="page-link" href="#" onclick="cambiarPagina(${i})">${i + 1}</a></li>`;
                }
            }

            // Next button
            if (data.number < data.totalPages - 1) {
                html += `<li class="page-item"><a class="page-link" href="#" onclick="cambiarPagina(${data.number + 1})">Siguiente</a></li>`;
            }

            html += '</ul></nav>';
            paginationDiv.innerHTML = html;
        }

        function cambiarPagina(page) {
            currentPage = page;
            buscarActividades();
        }

        function clearForm() {
            document.getElementById('searchForm').reset();
            document.getElementById('results').innerHTML = '';
            document.getElementById('pagination').innerHTML = '';
        }

        // Cargar actividades al inicio
        window.onload = function() {
            buscarActividades();
        };
    </script>
</body>
</html>
