<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="navbar(siteName, activePage)">
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-menu">
                <a th:href="@{/}" class="nav-link" th:classappend="${activePage == 'inicio'} ? 'active' : ''">
                    <i class="fas fa-home"></i>
                    <span>Inicio</span>
                </a>
                <a th:href="@{/agregarActividad}" class="nav-link" th:classappend="${activePage == 'Agregar actividad'} ? 'active' : ''">
                    <i class="fas fa-calendar"></i>
                    <span>Agregar actividad</span>
                </a>
                <a th:href="@{/listado-actividades}" class="nav-link" th:classappend="${activePage == 'listado'} ? 'active' : ''">
                    <i class="fas fa-list"></i>
                    <span>Listado de Actividades</span>
                </a>
                <a th:href="@{/stats}" class="nav-link" th:classappend="${activePage == 'estadisticas'} ? 'active' : ''">
                    <i class="fas fa-chart-bar"></i>
                    <span>Estadísticas</span>
                </a>
                <a th:href="@{/finishedActivity}" class="nav-link" th:classappend="${activePage == 'valorar'} ? 'active' : ''">
                    <i class="fas fa-star"></i>
                    <span>Valorar</span>
                </a>
            </div>
        </div>
    </nav>
</th:block>

</html>
