<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- Widget de integración con Python -->
    <div class="fixed-bottom p-3" style="z-index: 1000;" th:fragment="python-widget">
        <div class="card d-none" id="python-integration-widget">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h6 class="mb-0">
                    <i class="fab fa-python"></i> Integración Python
                </h6>
                <button class="btn btn-sm btn-outline-secondary" onclick="togglePythonWidget()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="card-body">
                <div id="python-widget-content"></div>
            </div>
        </div>
    </div>
</body>
</html>
