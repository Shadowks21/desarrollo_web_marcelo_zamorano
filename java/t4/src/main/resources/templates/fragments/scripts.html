<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- Scripts -->
    <div th:fragment="scripts(extraJs)">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
        <th:block th:if="${extraJs}">
            <script th:each="js : ${extraJs}" th:src="@{'/js/' + ${js}}"></script>
        </th:block>
    </div>
</body>
</html>
