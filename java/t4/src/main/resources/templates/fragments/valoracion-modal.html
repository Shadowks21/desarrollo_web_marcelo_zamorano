<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="valoracion-modal">
    <!-- Modal de Valoración -->
    <div id="valoracionModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Valorar Actividad</h3>
            </div>
            <div class="modal-body">
                <div class="stars-container">
                    <div class="star-item" th:each="i : ${#numbers.sequence(1, 7)}">
                        <span class="star" th:data-value="${i}">☆</span>
                        <span class="star-number" th:text="${i}">1</span>
                    </div>
                </div>
                <p class="rating-text">Selecciona una calificación del 1 al 7</p>
            </div>
            <div class="modal-footer">
                <button id="cancelarBtn" class="btn btn-secondary">Cancelar</button>
                <button id="evaluarBtn" class="btn btn-primary" disabled>Evaluar</button>
            </div>
        </div>
    </div>
</th:block>

</html>
