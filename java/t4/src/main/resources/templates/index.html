<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <th:block th:replace="fragments/head :: head('Actividades Recreativas - Inicio', ${ {'global.css', 'navbar.css', 'index-styles.css'} })"></th:block>
</head>
<body>
    <th:block th:replace="~{fragments/navbar :: navbar('Actividades recreativas de Chile', 'inicio')}"></th:block>
    
    <main layout:fragment="content">
        <div class="content-wrapper">
            <div class="main-content">
                <h1>
                    <i class="fas fa-star"></i>
                    Actividades Recreativas de Chile
                </h1>

                <div class="welcome-container">
                    <div class="welcome-card">
                        <h2>¡Bienvenido!</h2>
                        <p>
                            Valora las mejores actividades recreativas de Chile.
                        </p>
                        <div class="action-buttons">
                            <a href="/finishedActivity" class="action-btn">
                                <i class="fas fa-star"></i>
                                Valorar Actividades
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div th:replace="~{fragments/scripts :: scripts('admin-login-modal.js')}"></div>
        <div th:replace="~{fragments/admin-button :: admin-float-btn('Administrar')}"></div>
        <div th:replace="~{fragments/admin-login-modal :: admin-login-modal}"></div>
    </main>
</body>
</html>
