<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <th:block th:replace="fragments/head :: head('Inicio', ${ {'index-styles.css'} })"></th:block>
</head>
<body th:with="navbarTitle='Actividades recreativas de Chile', activePage='inicio'">
    <main layout:fragment="content">
        <div class="margin-top-50">
            <h2>Últimas actividades registradas:</h2>
        </div>
        <div class="margin-top-50">
            <div th:if="${data and not #lists.isEmpty(data)}">
                <table>
                    <thead>
                        <tr>
                            <th class="label-col">Inicio</th>
                            <th class="label-col">Término</th>
                            <th class="label-col">Comuna</th>
                            <th class="label-col">Sector</th>
                            <th class="label-col">Tema</th>
                            <th class="label-col">Imagen</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="actividad : ${data}">
                            <td th:text="${actividad.inicio}">Fecha inicio</td>
                            <td th:text="${actividad.termino}">Fecha término</td>
                            <td th:text="${actividad.comuna}">Comuna</td>
                            <td th:text="${actividad.sector}">Sector</td>
                            <td th:text="${actividad.tema}">Tema</td>
                            <td class="col-img">
                                <img th:each="img : ${actividad.imagen}" 
                                     th:src="@{'/uploads/' + ${img}}" 
                                     alt="Imagen de la actividad">
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <p th:unless="${data and not #lists.isEmpty(data)}">No hay actividades registradas.</p>
        </div>
    </main>
</body>
</html>
