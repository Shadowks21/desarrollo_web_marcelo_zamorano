# ================================
# Configuracion del Servidor
# ================================
server.port=8081

# ================================
# Configuracion de Base de Datos MySQL
# ================================
spring.datasource.url=jdbc:mysql://localhost:3306/tarea2?useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true
spring.datasource.username=cc5002
spring.datasource.password=programacionweb
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================================
# Configuracion JPA / Hibernate
# ================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ================================
# Configuracion Thymeleaf
# ================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# ================================
# Configuracion de Logging
# ================================
logging.level.org.springframework=INFO
logging.level.com.tarea4=DEBUG
logging.level.org.hibernate.SQL=DEBUG
